format = """\
  $username\
  $hostname\
  $directory\
  $aws\
  $kubernetes\
  $python\
  $ruby\
  $nodejs\
  $java\
  $dotnet\
  $golang\
  $rust\
  $env_var\
  $cmd_duration\
  $time\
  $git_branch\
  $git_commit\
  $git_state\
  $git_status\
  $hg_branch\
  $line_break\
  $jobs\
  $battery\
  $memory_usage\
  $character\
"""

[character]
success_symbol = "[g9v9g](bold green)"
error_symbol = "[g9v9g](bold red)"
vicmd_symbol = "[g9v9g](bold green)"

[time]
disabled        = false
style           = "bold white"
utc_time_offset = +9

[cmd_duration]
min_time          = 0
show_milliseconds = true
style             = "bold white"

[git_branch]
symbol = ""

[git_status]
format     = "[$all_status](bold yellow)"
ahead      = "ahead "
behind     = "behind "
conflicted = "conflicted "
deleted    = "deleted "
diverged   = "diverged "
modified   = "modified "
renamed    = "renamed "
staged     = "staged "
stashed    = "stashed "
untracked  = "untracked "

[aws.region_aliases]
ap-northeast-1 = "AN1"
us-east-1      = "UE1"

[kubernetes]
disabled = false
style    = "blue"
symbol   = ""