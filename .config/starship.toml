prompt_order = [
  "username",
  "hostname",
  "directory",
  "aws",
  "kubernetes",
  "python",
  "ruby",
  "nodejs",
  "java",
  "dotnet",
  "golang",
  "rust",
  "env_var",
  "cmd_duration",
  "time",
  "git_branch",
  "git_commit",
  "git_state",
  "git_status",
  "hg_branch",
  "line_break",
  "jobs",
  "battery",
  "memory_usage",
  "character",
]

[character]
symbol = "g9v9g"

[time]
disabled        = false
style           = "bold white"
utc_time_offset = +9

[cmd_duration]
min_time          = 0
show_milliseconds = true
style             = "bold white"

[git_branch]
symbol = ""

[git_status]
ahead      = "ahead "
behind     = "behind "
conflicted = "conflicted "
deleted    = "deleted "
diverged   = "diverged "
modified   = "modified "
prefix     = ""
renamed    = "renamed "
staged     = "staged "
stashed    = "stashed "
suffix     = " "
untracked  = "untracked "

[aws.region_aliases]
ap-northeast-1 = "AN1"
us-east-1      = "UE1"

[kubernetes]
disabled = false
style    = "blue"
symbol   = ""